<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>open-os cli</title>
  <link rel="stylesheet" href="./xterm.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

  <!-- Tab bar -->
  <div id="tab-bar">
    <button id="tab-add" title="New Tab">+</button>
  </div>

  <!-- Terminal container: each tab creates a child .terminal-pane inside here -->
  <div id="terminal-container"></div>

  <!-- Panel: slide-up overlay for model selection and info -->
  <div id="ai-panel">
    <div id="ai-header">
      <span>open-os</span>
      <span id="ai-model-label"></span>
      <span id="ai-status"></span>
      <button id="ai-settings" title="Settings">&#9881;</button>
      <button id="ai-close">&times;</button>
    </div>

    <!-- Model selection: shown when no model or user wants to switch -->
    <div id="ai-setup" class="hidden">
      <p id="setup-message">Loading models from Ollama...</p>
      <div id="model-list"></div>
    </div>

    <!-- Model info: shown when a model is selected -->
    <div id="ai-model-info" class="hidden">
      <div id="ai-model-details"></div>
      <button id="ai-change-model" class="model-btn">Change model</button>
    </div>
  </div>

  <!-- Hint bar -->
  <div id="hint-bar">Ctrl+Space &mdash; open-os inline &nbsp;|&nbsp; Click here &mdash; open-os panel</div>

  <script src="./renderer.js"></script>
</body>
</html>
